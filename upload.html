<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Upload App - Runstore</title>

<style>

body{
  background:#000;
  color:white;
  font-family:Arial;
  padding:20px;
  margin:0;
}

h1{
  text-align:center;
  font-size:40px;
}

.payment-box{
  background:#111;
  padding:20px;
  border-radius:20px;
  margin-top:20px;
  border:2px solid #00bfff;
}

.payment-box h2{
  color:#00bfff;
}

input,
textarea{

  width:100%;
  padding:18px;
  margin-top:15px;
  border:none;
  border-radius:15px;
  background:#111;
  color:white;
  font-size:20px;
  box-sizing:border-box;
  outline:none;

}

textarea{
  height:120px;
  resize:none;
}

button{

  width:100%;
  padding:18px;
  margin-top:25px;
  border:none;
  border-radius:15px;
  background:#00bfff;
  color:white;
  font-size:24px;
  font-weight:bold;
  cursor:pointer;

}

button:disabled{
  opacity:0.6;
}

.note{

  background:#111;
  padding:15px;
  border-radius:15px;
  margin-top:20px;
  color:#ccc;
  line-height:1.6;

}

</style>

</head>

<body>

<h1>Upload Your App</h1>

<div class="payment-box">

<h2>Pay $5 Upload Fee</h2>

<p>

JazzCash Number:

<br><br>

<b>03072989491</b>

</p>

<p>
After payment upload screenshot URL below.
</p>

</div>

<div class="note">

Your app will be reviewed by Runstore Admin before publishing.

</div>

<input
type="text"
id="appName"
placeholder="App Name"
>

<textarea
id="appDesc"
placeholder="App Description"
></textarea>

<input
type="text"
id="appCategory"
placeholder="Category"
>

<input
type="text"
id="appImage"
placeholder="App Image URL"
>

<input
type="text"
id="appLink"
placeholder="APK Download Link"
>

<input
type="text"
id="developer"
placeholder="Developer Name"
>

<input
type="text"
id="paymentScreenshot"
placeholder="Payment Screenshot URL"
>

<button id="submitBtn"
onclick="submitApp()">

Submit App

</button>

<script type="module">

import { db } from './js/firebase.js';

import {

collection,
addDoc

} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

window.submitApp = async()=>{

const submitBtn =
document.getElementById("submitBtn");

const appName =
document.getElementById("appName").value.trim();

const appDesc =
document.getElementById("appDesc").value.trim();

const appCategory =
document.getElementById("appCategory").value.trim();

const appImage =
document.getElementById("appImage").value.trim();

const appLink =
document.getElementById("appLink").value.trim();

const developer =
document.getElementById("developer").value.trim();

const paymentScreenshot =
document.getElementById("paymentScreenshot").value.trim();

if(
appName === "" ||
appDesc === "" ||
appCategory === "" ||
appImage === "" ||
appLink === "" ||
developer === "" ||
paymentScreenshot === ""
){

alert("Please fill all fields");

return;

}

try{

submitBtn.disabled = true;

submitBtn.innerText = "Submitting...";

await addDoc(
collection(db,"pendingApps"),
{

name: appName,
desc: appDesc,
category: appCategory,
image: appImage,
link: appLink,
developer: developer,
payment: paymentScreenshot,

approved:false,

featured:"no",

downloads:0,

createdAt: Date.now()

}
);

alert("App Submitted Successfully");

document.getElementById("appName").value = "";
document.getElementById("appDesc").value = "";
document.getElementById("appCategory").value = "";
document.getElementById("appImage").value = "";
document.getElementById("appLink").value = "";
document.getElementById("developer").value = "";
document.getElementById("paymentScreenshot").value = "";

}catch(error){

alert(error.message);

}

submitBtn.disabled = false;

submitBtn.innerText = "Submit App";

};

</script>

</body>
</html>
