<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Runstore</title>

<style>

body{
  background:#000;
  color:white;
  font-family:Arial;
  margin:0;
  padding:0;
}

header{
  text-align:center;
  font-size:40px;
  font-weight:bold;
  padding:30px;
  border-bottom:1px solid #222;
}

.container{
  padding:20px;
}

.search-box{
  width:100%;
  padding:18px;
  border-radius:20px;
  border:3px solid orange;
  background:#111;
  color:white;
  font-size:22px;
  box-sizing:border-box;
  margin-bottom:30px;
}

h2{
  font-size:60px;
  margin-bottom:30px;
}

.app-card{
  background:#111;
  border-radius:30px;
  padding:20px;
  margin-bottom:30px;
  cursor:pointer;
}

.app-card img{
  width:100%;
  height:280px;
  object-fit:cover;
  border-radius:20px;
}

.app-card h3{
  font-size:45px;
  margin-top:20px;
  margin-bottom:10px;
}

.app-card p{
  font-size:30px;
  color:#ccc;
}

.download-btn{
  display:inline-block;
  margin-top:20px;
  padding:18px 35px;
  background:#00bfff;
  color:white;
  text-decoration:none;
  border-radius:18px;
  font-size:28px;
  font-weight:bold;
}

button{
  padding:18px 35px;
  border:none;
  border-radius:18px;
  background:#00bfff;
  color:white;
  font-size:28px;
  margin-left:10px;
}

</style>

</head>
<body>

<header>Runstore</header>

<div class="container">

<input
type="text"
id="search"
class="search-box"
placeholder="Search Apps..."
>

<h2>⭐ Featured Apps</h2>

<div id="featuredApps"></div>

<div id="appsContainer"></div>

</div>

<script type="module">

import { db } from './js/firebase.js';

import {
collection,
getDocs,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const appsContainer =
document.getElementById("appsContainer");

const featuredApps =
document.getElementById("featuredApps");

async function loadApps(){

appsContainer.innerHTML = "";
featuredApps.innerHTML = "";

const querySnapshot =
await getDocs(collection(db,"apps"));

querySnapshot.forEach((documentItem)=>{

const app = documentItem.data();

const appData = encodeURIComponent(
JSON.stringify(app)
);

if(app.featured === "yes"){

featuredApps.innerHTML += `

<div
class="app-card"
onclick="openDetails('${appData}')"
>

<img src="${app.image}">

<h3>⭐ ${app.name}</h3>

<p>${app.desc}</p>

</div>

`;

}

appsContainer.innerHTML += `

<div
class="app-card"
onclick="openDetails('${appData}')"
>

<img src="${app.image}">

<h3>${app.name}</h3>

<p>${app.desc}</p>

<p>
Category:
<b>${app.category}</b>
</p>

<a
class="download-btn"
href="${app.link}"
target="_blank"
onclick="event.stopPropagation()"
>
Download
</a>

<button
onclick="
event.stopPropagation();
deleteApp('${documentItem.id}')
"
>
Delete
</button>

</div>

`;

});

}

loadApps();

document
.getElementById("search")
.addEventListener("input",(e)=>{

const value =
e.target.value.toLowerCase();

const cards =
document.querySelectorAll(".app-card");

cards.forEach((card)=>{

const text =
card.innerText.toLowerCase();

if(text.includes(value)){
card.style.display = "block";
}else{
card.style.display = "none";
}

});

});

window.openDetails = (appData)=>{

localStorage.setItem(
"selectedApp",
decodeURIComponent(appData)
);

window.location.href =
"details.html";

};

window.deleteApp = async(id)=>{

await deleteDoc(doc(db,"apps",id));

alert("App Deleted");

loadApps();

};

</script>

</body>
</html>
