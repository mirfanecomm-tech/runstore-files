<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Runstore Login</title>

<style>

body{
background:#000;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
margin:0;
}

.box{
background:#111;
padding:40px;
border-radius:25px;
width:85%;
max-width:400px;
text-align:center;
}

h1{
color:white;
font-size:45px;
margin-bottom:30px;
}

input{
width:100%;
padding:18px;
margin-bottom:20px;
border-radius:15px;
border:2px solid orange;
background:#000;
color:white;
font-size:22px;
box-sizing:border-box;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:15px;
background:#00bfff;
color:white;
font-size:24px;
font-weight:bold;
}

</style>
</head>
<body>

<div class="box">

<h1>Admin Login</h1>

<input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Password">

<button onclick="login()">
Login
</button>

</div>

<script>

function login(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

if(
email === "admin@gmail.com"
&&
password === "123456"
){

localStorage.setItem(
"adminLoggedIn",
"true"
);

window.location.href =
"admin.html";

}else{

alert("Wrong Email or Password");

}

}

</script>

</body>
</html>
